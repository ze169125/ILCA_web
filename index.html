<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <title>Pampero</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body class="live">
  <header>
    <span id="sail-badge">---</span>
    <button id="menu-btn" aria-label="menu">≡</button>
  </header>

  <main class="readout">
    <section class="row row-hdg">
      <div class="label">HDG</div>
      <div class="value"><span id="heading-val">---</span><span class="unit">°</span></div>
      <div class="sub" id="heading-src">&nbsp;</div>
    </section>

    <section class="row row-heel">
      <div class="label">HEEL</div>
      <div class="value">
        <span id="heel-val">--</span><span class="unit">°</span>
        <span id="heel-side" class="side"></span>
      </div>
    </section>

    <section class="row row-sog">
      <div class="label">SOG</div>
      <div class="value"><span id="sog-val">--</span><span class="unit">kn</span></div>
    </section>
  </main>

  <footer>
    <div id="status-line" class="ok">iniciando…</div>
    <div id="debug-line" class="debug">ax -- ay -- az --</div>
  </footer>

  <dialog id="menu">
    <button data-action="start-race">▶ Começar regata</button>
    <button data-action="stop-race">■ Parar regata</button>
    <button data-action="zero-heel">Zerar heel</button>
    <button data-action="share-gpx">Compartilhar GPX</button>
    <button data-action="share-csv">Compartilhar CSV</button>
    <button data-action="clear-data" class="danger">Limpar dados</button>
    <button data-action="close" class="secondary">Fechar</button>
  </dialog>

  <script src="vendor/dexie.min.js"></script>
  <script src="sensors.js"></script>
  <script src="storage.js"></script>
  <script src="share.js"></script>
  <script src="gpx.js"></script>
  <script src="csv.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
</body>
</html>

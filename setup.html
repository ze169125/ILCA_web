<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Pampero — Setup</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body class="setup">
  <main>
    <h1>Pampero</h1>
    <p class="sub">ABCL Lightning — registro inicial</p>

    <form id="form" autocomplete="off">
      <label for="sail">Identificação do barco</label>
      <input id="sail" type="text" inputmode="latin" autocapitalize="words"
             placeholder="BRA-15832, Lightning Maria, ..." spellcheck="false" required>
      <p class="hint">Pode ser número de vela (<code>BRA-15832</code>), nome do barco, ou qualquer texto. Aparece no rodapé e nos arquivos exportados.</p>

      <button id="start" type="submit">Iniciar</button>
      <p class="hint" id="perm-hint">O botão pede permissão de GPS e orientação.</p>
    </form>
  </main>
  <script>
    const form = document.getElementById('form');
    const sailInput = document.getElementById('sail');
    sailInput.value = localStorage.getItem('pampero.sail') || '';

    async function requestSensorPerms() {
      if (typeof DeviceOrientationEvent !== 'undefined'
          && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try { await DeviceOrientationEvent.requestPermission(); } catch (_) {}
      }
      if (typeof DeviceMotionEvent !== 'undefined'
          && typeof DeviceMotionEvent.requestPermission === 'function') {
        try { await DeviceMotionEvent.requestPermission(); } catch (_) {}
      }
      if ('geolocation' in navigator) {
        await new Promise(res => navigator.geolocation.getCurrentPosition(res, res, {timeout: 3000}));
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const v = sailInput.value.trim();
      if (!v) {
        alert('Coloca uma identificação qualquer.');
        return;
      }
      localStorage.setItem('pampero.sail', v);
      await requestSensorPerms();
      location.href = 'index.html';
    });
  </script>
</body>
</html>
